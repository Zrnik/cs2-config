// Recoil follow modes
//
// KP_PLUS:  rifle mode  - recoil follow on/off per attack
// KP_MINUS: pistol mode - recoil follow always on (no snap-back)
// KP_MULTIPLY: static mode - recoil follow always off, alternate color

alias "+rifleAttack" "+attack; cl_crosshair_recoil true; spec_next"
alias "-rifleAttack" "-attack; cl_crosshair_recoil false"

alias "defaultCrosshairColor" "cl_crosshaircolor 4; cl_crosshaircolor_b 200; cl_crosshaircolor_g 250; cl_crosshaircolor_r 200"
alias "staticCrosshairColor" "cl_crosshaircolor 5; cl_crosshaircolor_b 80; cl_crosshaircolor_g 220; cl_crosshaircolor_r 255"

alias "rifleMode" "defaultCrosshairColor; bind MOUSE1 +rifleAttack; cl_crosshair_recoil false; cl_crosshairdot 0; alias currentMode rifleMode"
alias "pistolMode" "defaultCrosshairColor; cl_crosshair_recoil true; bind MOUSE1 +attack; cl_crosshairdot 1; alias currentMode pistolMode"
alias "staticMode" "staticCrosshairColor; cl_crosshair_recoil false; bind MOUSE1 +attack; cl_crosshairdot 0; alias currentMode staticMode"

// Default: rifle mode (set directly since alias calls don't execute from cfg)
bind "MOUSE1" "+rifleAttack"
cl_crosshair_recoil false
cl_crosshairdot 0
cl_crosshaircolor 4
cl_crosshaircolor_b 200
cl_crosshaircolor_g 250
cl_crosshaircolor_r 200

bind "KP_PLUS" "rifleMode"
bind "KP_MINUS" "pistolMode"
bind "KP_MULTIPLY" "staticMode"
